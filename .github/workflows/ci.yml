name: CI

on:
  pull_request:
    branches: [main]
  # Também valida o RESULTADO do merge em main. Sem isso, PRs verdes isolados
  # podem quebrar combinados (lint/tsc só checa cada branch contra a base ANTIGA)
  # e um main quebrado só apareceria no build do deploy. Com push em main, o CI
  # roda pós-merge e main quebrado fica vermelho na hora.
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -p tsconfig.app.json --noEmit
